<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Victim Machine</title>
    <style>
        body {
            font-family: Arial;
            background: #fff;
            color: #000;
            text-align: center;
        }

        #box {
            font-size: 40px;
            padding: 40px;
            margin-top: 40px;
            border-radius: 20px;
            width: 400px;
            margin: auto;
        }

        .safe {
            background: #a4f5a4;
        }

        .attack {
            background: #ff7e7e;
        }
    </style>
</head>

<body>

    <h2>Victim Detection Screen</h2>
    <div id="box" class="safe">Waiting...</div>

    <script>
        const API_BASE = "http://127.0.0.1:5000";

        async function fetchResult() {
            const res = await fetch(API_BASE + "/get-result");
            const data = await res.json();

            const box = document.getElementById("box");
            box.textContent = data.prediction;

            if (data.class_id === 0) {
                box.className = "safe";
            } else {
                box.className = "attack";
            }
        }

        // poll every 1 second
        setInterval(fetchResult, 1000);
    </script>

</body>

</html>
