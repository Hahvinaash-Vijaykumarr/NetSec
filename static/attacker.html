<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Attacker Panel</title>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: #eee;
            text-align: center;
        }

        input,
        button {
            padding: 10px;
            margin: 10px;
            font-size: 18px;
        }

        #result {
            white-space: pre-wrap;
            background: #222;
            padding: 10px;
            margin-top: 10px;
            height: 200px;
            overflow-y: auto;
        }
    </style>
</head>

<body>

    <h2>Attacker Console</h2>
    <p>Select a sample index to send malicious packet:</p>

    <input id="sample-idx" type="number" placeholder="0" min="0">
    <button id="btn-send">Send Packet</button>

    <div id="result"></div>

    <script>
        const API_BASE = "http://127.0.0.1:5000";

        async function postJSON(path, body) {
            const res = await fetch(API_BASE + path, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });
            return res.json();
        }

        function show(msg) {
            const el = document.getElementById("result");
            el.textContent = new Date().toLocaleTimeString() + " - " + msg + "\n" + el.textContent;
        }

        document.getElementById("btn-send").addEventListener("click", async () => {
            const idx = parseInt(document.getElementById("sample-idx").value) || 0;
            show("Sending sample " + idx + "...");
            const res = await postJSON("/send-sample", { idx });
            show("Response: " + JSON.stringify(res));
        });
    </script>

</body>

</html>
